<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just The Two Of Us</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

.fade-info {
  opacity: 0;
  transition: opacity 0.35s ease;
}

.fade-info.show {
  opacity: 1;
}

@font-face {
  font-family: 'Caviar Dreams';
  src: url('CaviarDreams.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #FDF8F5, #F6EEE8);
  color: #3A2E2A;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 50px 20px;
}

h1 {
  font-family: 'Caviar Dreams', sans-serif;
  text-align: center;
  margin-bottom: 50px;
  font-size: 44px;
  letter-spacing: 3px;
  color: #B07D74;
}

#map {
  width: 100%;
  height: 500px;
  border-radius: 22px;
  margin-bottom: 60px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* GRID */

#places-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  align-items: stretch;
}

@media (max-width: 1024px) {
  #places-list {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  #places-list {
    grid-template-columns: 1fr;
  }
}

/* PLACE BOX */

.place.parent {
  background: #FFFFFF;
  border: 1px solid #E7D9CF;
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  min-height: 90px;   /* Equal height base */
}

.place.parent:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(169,116,110,0.2);
}

.place.active {
  background: #FBEDEA;
  border: 2px solid #C67C73;
  box-shadow: 0 8px 25px rgba(198,124,115,0.35);
}

.place-header {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.place-number {
  font-weight: 700;
  color: #C67C73;
  font-size: 18px;
  min-width: 30px;
}

footer {
  text-align: center;
  margin-top: 80px;
  font-size: 14px;
  color: #9C8A84;
}
</style>
</head>

<body>

<div id="main-content" style="display:none">
  <div class="container">
    <h1>Just The Two Of Us</h1>
    <div id="map"></div>
    <div id="places-list"></div>
    <footer>Built quietly over two years.</footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  let password = prompt("Enter the password:");
  if(password !== "march18") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
    return;
  }

  document.getElementById("main-content").style.display = "block";

  let map, infoWindow;
  let parentCounter = 1;
  let activeDiv = null;

  function initMap() {

    const snazzyStyle = [

  // Base land
  {
    "featureType": "landscape",
    "elementType": "geometry",
    "stylers": [{ "color": "#DAD7CD" }]
  },

  // Water
  {
    "featureType": "water",
    "elementType": "geometry.fill",
    "stylers": [{ "color": "#A3B18A" }]
  },

  // Roads
  {
    "featureType": "road",
    "elementType": "geometry",
    "stylers": [{ "color": "#FFFFFF" }]
  },
  {
    "featureType": "road.arterial",
    "elementType": "geometry",
    "stylers": [{ "color": "#A3B18A" }]
  },
  {
    "featureType": "road.highway",
    "elementType": "geometry",
    "stylers": [{ "color": "#588157" }]
  },

  // Labels
  {
    "featureType": "all",
    "elementType": "labels.text.fill",
    "stylers": [{ "color": "#344E41" }]
  },
  {
    "featureType": "all",
    "elementType": "labels.text.stroke",
    "stylers": [{ "color": "#DAD7CD" }]
  },

  // Parks
  {
    "featureType": "poi.park",
    "elementType": "geometry.fill",
    "stylers": [{ "color": "#A3B18A" }]
  }

];

    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: -31.9523, lng: 115.8613 },
      zoom: 12,
      styles: snazzyStyle,
      mapTypeControl: false,
      streetViewControl: false
    });

    infoWindow = new google.maps.InfoWindow();

    Papa.parse('https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGFuqglhR7Ss03-SJVzB_St46vLigoCEj6MOmJmSBsqg2SD0ebiTRt49IZ6jJnhYPlZtVBVpvX8ZG/pub?output=csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        addPlaces(results.data);
      }
    });
  }

  function addPlaces(data) {

    const listDiv = document.getElementById("places-list");
    const childrenMap = {};

    data.forEach(row => {
      if(row.Parent) {
        if(!childrenMap[row.Parent]) childrenMap[row.Parent] = [];
        childrenMap[row.Parent].push(row);
      }
    });

    data.forEach(row => {
      if(!row.Parent) {

        const markerLabel = String(parentCounter++);

        const marker = new google.maps.Marker({
          position: { lat: parseFloat(row.Lat), lng: parseFloat(row.Lng) },
          map: map,
          label: markerLabel,
          title: row.Name
        });

        function buildInfoContent() {

  let html = `
    <div style="
      font-family: 'Inter', sans-serif;
      padding: 10px 6px;
      max-width: 240px;
    ">
      <div style="
        font-family: 'Caviar Dreams', sans-serif;
        font-size: 18px;
        letter-spacing: 1px;
        color: #B07D74;
        margin-bottom: 8px;
      ">
        ${row.Name}
      </div>
  `;

  if (childrenMap[row.Name]) {

    const sortedChildren = childrenMap[row.Name]
      .sort((a, b) => a.Name.localeCompare(b.Name));

    html += `
      <ul style="
        margin: 6px 0 0 0;
        padding-left: 18px;
        line-height: 1.6;
        font-size: 13px;
        color: #6F5E5A;
        border-top: 1px solid #EADCD6;
        padding-top: 8px;
      ">
    `;

    sortedChildren.forEach(child => {
      html += `<li>${child.Name}</li>`;
    });

    html += `</ul>`;
  }

  html += `</div>`;

  return html;
}

        const parentDiv = document.createElement("div");
        parentDiv.className = "place parent";

        function setActive(div) {
          if(activeDiv) activeDiv.classList.remove("active");
          div.classList.add("active");
          activeDiv = div;
        }

        marker.addListener("click", function() {
          function openWithFade(marker, parentDiv) {

  const container = document.createElement("div");
  container.className = "fade-info";
  container.innerHTML = buildInfoContent();

  infoWindow.setContent(container);
  infoWindow.open(map, marker);

  // Trigger fade
  setTimeout(() => {
    container.classList.add("show");
  }, 50);

  setActive(parentDiv);
}
          setActive(parentDiv);
        });

        const header = document.createElement("div");
        header.className = "place-header";

        const number = document.createElement("span");
        number.className = "place-number";
        number.textContent = markerLabel;

        const name = document.createElement("span");
        name.textContent = row.Name;

        header.appendChild(number);
        header.appendChild(name);
        parentDiv.appendChild(header);

        parentDiv.onclick = function() {
          window.scrollTo({ top: 0, behavior: "smooth" });
          map.setCenter({ lat: parseFloat(row.Lat), lng: parseFloat(row.Lng) });
          map.setZoom(16);
          function openWithFade(marker, parentDiv) {

  const container = document.createElement("div");
  container.className = "fade-info";
  container.innerHTML = buildInfoContent();

  infoWindow.setContent(container);
  infoWindow.open(map, marker);

  // Trigger fade
  setTimeout(() => {
    container.classList.add("show");
  }, 50);

  setActive(parentDiv);
}
          setActive(parentDiv);
        };

        listDiv.appendChild(parentDiv);
      }
    });
  }

  window.initMap = initMap;
});
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAVImtk_O82lOoIWlJGkYM_sMw0oAYZIhQ&callback=initMap">
</script>

</body>
</html>
