<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just The Two Of Us</title>

<link href="https://fonts.cdnfonts.com/css/caviar-dreams" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background-image: linear-gradient(to bottom, #FFFFFF, #D8F3DC);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 20px;
}

h1 {
    font-family: 'Caviar Dreams', sans-serif;
    text-align: center;
    padding: 20px;
    color: #344E41;
    letter-spacing: 1px;
    font-size: 50px;
}

#map {
  width: 100%;
  height: 500px;
  border-radius: 22px;
  margin-bottom: 40px;
  box-shadow: 0 8px 25px rgba(52, 78, 65, 0.25);
}
  
#places-list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  align-items: stretch;
}

@media (max-width: 1024px) {
  #places-list {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 600px) {
  #places-list {
    grid-template-columns: repeat(2, 1fr);
  }
}

.place.parent {
  background: #FFFFFF;
  border: 1px solid #000000;
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  min-height: 50px;
}

.place.parent:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(88, 129, 87, 0.3);
  background: #B7E4C7;
}

.place.active {
  background: #95D5B2;
  border: 2px solid #000000;
  box-shadow: 0 8px 25px rgba(58, 90, 64, 0.35);
  color: #000000;
}

.place-header {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}

.place-number {
  font-weight: 700;
  color: #000000;
  font-size: 18px;
  min-width: 30px;
}

footer {
  text-align: center;
  margin-top: 40px;
  margin-bottom: 40px;
  font-size: 14px;
  color: #344E41;
}
</style>
</head>

<body>

<div id="main-content" style="display:none">
  <div class="container">
    <h1>Just The Two Of Us</h1>
    <div id="map"></div>
    <div id="places-list"></div>
    <footer>Built quietly over two years.</footer>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  let password = prompt("Enter the password:");
  if(password !== "march18") {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Access Denied</h2>";
    return;
  }

  document.getElementById("main-content").style.display = "block";

  let map, infoWindow;
  let parentCounter = 1;
  let activeDiv = null;

  function initMap() {

    const snazzyStyle = [
      {"featureType":"all","elementType":"labels","stylers":[{"visibility":"off"}]},
      {"featureType":"poi.park","elementType":"geometry.fill","stylers":[{"color":"#aadd55"}]},
      {"featureType":"road.highway","elementType":"labels","stylers":[{"visibility":"off"}]},
      {"featureType":"road.arterial","elementType":"labels.text","stylers":[{"visibility":"on"}]},
      {"featureType":"road.local","elementType":"labels.text","stylers":[{"visibility":"on"}]},
      {"featureType":"water","elementType":"geometry.fill","stylers":[{"color":"#0099dd"}]}
    ];

    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: -31.9523, lng: 115.8613 },
      zoom: 12,
      styles: snazzyStyle,
      mapTypeControl: false,
      streetViewControl: false
    });

    infoWindow = new google.maps.InfoWindow();

    Papa.parse('https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGFuqglhR7Ss03-SJVzB_St46vLigoCEj6MOmJmSBsqg2SD0ebiTRt49IZ6jJnhYPlZtVBVpvX8ZG/pub?output=csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        addPlaces(results.data);
      }
    });
  }

  function addPlaces(data) {

    const listDiv = document.getElementById("places-list");
    const childrenMap = {};

    data.forEach(row => {
      if(row.Parent) {
        if(!childrenMap[row.Parent]) childrenMap[row.Parent] = [];
        childrenMap[row.Parent].push(row);
      }
    });

    data.forEach(row => {
      if(!row.Parent) {

        const markerLabel = String(parentCounter++);

        const marker = new google.maps.Marker({
          position: { lat: parseFloat(row.Lat), lng: parseFloat(row.Lng) },
          map: map,
          label: {
            text: markerLabel,
            color: "#FFFFFF"
          },
          icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 12,
            fillColor: "#344E41",
            fillOpacity: 1,
            strokeWeight: 1,
            strokeColor: "#FFFFFF"
          },
          title: row.Name
        });

function buildInfoContent() {

  let html = `
    <div style="
      font-family: 'Inter', sans-serif;
      padding: 14px 16px;
      min-width: 220px;
      max-width: 260px;
      color: #344E41;
    ">
      <div style="
        font-family: 'Caviar Dreams', sans-serif;
        font-size: 18px;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
        color: #344E41;
      ">
        ${row.Name}
      </div>
  `;

  if(childrenMap[row.Name]) {

    const sortedChildren = childrenMap[row.Name]
      .sort((a,b) => a.Name.localeCompare(b.Name));

    html += `
      <div style="
        height: 1px;
        background: #DAD7CD;
        margin: 8px 0 10px 0;
      "></div>

      <ul style="
        margin: 0;
        padding-left: 16px;
        line-height: 1.6;
        font-size: 14px;
        color: #3A5A40;
      ">
    `;

    sortedChildren.forEach(child => {
      html += `<li style="margin-bottom:4px;">${child.Name}</li>`;
    });

    html += "</ul>";
  }

  html += `
      <div style="
        margin-top: 10px;
        font-size: 12px;
        color: #588157;
        opacity: 0.85;
      ">
        One of our memories 🤍
      </div>
    </div>
  `;

  return html;
}

          html += "</div>";
          return html;
        }

        const parentDiv = document.createElement("div");
        parentDiv.className = "place parent";

        function setActive(div) {
          if(activeDiv) activeDiv.classList.remove("active");
          div.classList.add("active");
          activeDiv = div;
        }

        marker.addListener("click", function() {
          infoWindow.setContent(buildInfoContent());
          infoWindow.open(map, marker);
          setActive(parentDiv);
        });

        const header = document.createElement("div");
        header.className = "place-header";

        const number = document.createElement("span");
        number.className = "place-number";
        number.textContent = markerLabel;

        const name = document.createElement("span");
        name.textContent = row.Name;

        header.appendChild(number);
        header.appendChild(name);
        parentDiv.appendChild(header);

        parentDiv.onclick = function() {
          window.scrollTo({ top: 0, behavior: "smooth" });
          map.setCenter({ lat: parseFloat(row.Lat), lng: parseFloat(row.Lng) });
          map.setZoom(16);
          infoWindow.setContent(buildInfoContent());
          infoWindow.open(map, marker);
          setActive(parentDiv);
        };

        listDiv.appendChild(parentDiv);
      }
    });
  }

  window.initMap = initMap;
});
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAVImtk_O82lOoIWlJGkYM_sMw0oAYZIhQ&callback=initMap">
</script>

</body>
</html>
